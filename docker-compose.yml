services:
  ollama:
    image: ollama/ollama:latest
    container_name: thinkai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  api:
    build: ./api
    container_name: thinkai-api
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      DB_PATH: /data/sessions.sqlite
      CORS_ORIGINS: "*"
    volumes:
      - api-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # Em produção (EC2), troque para http://SEU_IP_PUBLICO:8000
        VITE_API_URL: http://localhost:8000
    container_name: thinkai-web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  ollama-models:
  api-data:
