services:
  db:
    image: postgres:16-alpine
    container_name: thinkai-db
    environment:
      POSTGRES_USER: thinkai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-thinkai}
      POSTGRES_DB: thinkai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinkai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    container_name: thinkai-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://thinkai:${DB_PASSWORD:-thinkai}@db:5432/thinkai
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: "*"
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-Você é o ThinkAI, um assistente prestativo, claro e conciso. Atue como um assistente de estudos sobre a área de interesse do usuário, recomendando questões, referências e respondendo a dúvidas. Responda no mesmo idioma da pergunta.}
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: thinkai-web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres-data:
