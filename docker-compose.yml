services:
  db:
    # pgvector/pgvector:pg16 = Postgres 16 + extensão pgvector (RAG, issue #34).
    image: pgvector/pgvector:pg16
    container_name: thinkai-db
    environment:
      POSTGRES_USER: thinkai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-thinkai}
      POSTGRES_DB: thinkai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinkai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    image: ghcr.io/gutoportelaa/estudo-chatbot-api:latest
    container_name: thinkai-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://thinkai:${DB_PASSWORD:-thinkai}@db:5432/thinkai
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_MODEL: ${LLM_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      # Busca web (#35): Tavily em produção; sem chave cai no DuckDuckGo.
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      WEB_SEARCH_PROVIDER: ${WEB_SEARCH_PROVIDER:-auto}
      # RAG em produção: embeddings gerenciados (Gemini) + storage S3.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Gestão de histórico (para visualizar a compactação/recompactação #31).
      HISTORY_STRATEGY: ${HISTORY_STRATEGY:-hybrid}
      HISTORY_WINDOW_MESSAGES: ${HISTORY_WINDOW_MESSAGES:-12}
      HISTORY_SUMMARIZE_AFTER_MESSAGES: ${HISTORY_SUMMARIZE_AFTER_MESSAGES:-6}
      HISTORY_SUMMARY_MAX_TOKENS: ${HISTORY_SUMMARY_MAX_TOKENS:-600}
      CORS_ORIGINS: "*"
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-Você é o ThinkAI, um assistente prestativo, claro e conciso. Atue como um assistente de estudos sobre a área de interesse do usuário, recomendando questões, referências e respondendo a dúvidas. Responda no mesmo idioma da pergunta. Quando o usuário pedir um mapa mental, mindmap, diagrama ou esquema, responda com um bloco de código de linguagem `markmap` contendo um outline em markdown (um título `#` central, `##` para ramos e itens `-` para folhas), com rótulos curtos.}
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    image: ghcr.io/gutoportelaa/estudo-chatbot-web:latest
    container_name: thinkai-web
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres-data:
