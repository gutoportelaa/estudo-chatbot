[project]
name = "thinkai-api"
version = "0.1.0"
description = "Backend de chatbot multiusuário com FastAPI + LangGraph + Ollama"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "langgraph>=0.2.50",
    "langchain-ollama>=0.2.0",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "pydantic-settings>=2.5.0",
    "aiosqlite>=0.20.0",
]

[tool.uv]
package = false
