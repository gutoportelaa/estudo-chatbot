name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: api
        run: uv sync

      - name: Lint (ruff)
        working-directory: api
        run: uvx ruff check .

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Type-check
        working-directory: web
        run: bunx tsc --noEmit

      - name: Build
        working-directory: web
        run: bun run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8000' }}

  publish:
    name: Build & push imagens Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ghcr.io/gutoportelaa/estudo-chatbot-api:latest

      - name: Build e push — Web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ghcr.io/gutoportelaa/estudo-chatbot-web:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
