name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy na EC2
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Aguardar SSH da EC2 ficar disponível
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          MAX_ATTEMPTS: 8
          PROBE_TIMEOUT: 5
          SLEEP_SECONDS: 10
        run: |
          python3 - <<'PY'
          import os
          import socket
          import sys
          import time

          host = os.environ["EC2_HOST"]
          max_attempts = int(os.environ["MAX_ATTEMPTS"])
          probe_timeout = int(os.environ["PROBE_TIMEOUT"])
          sleep_seconds = int(os.environ["SLEEP_SECONDS"])

          for attempt in range(1, max_attempts + 1):
              try:
                  with socket.create_connection((host, 22), timeout=probe_timeout):
                      print(f"SSH disponível na tentativa {attempt}.")
                      sys.exit(0)
              except OSError:
                  print(f"Aguardando SSH da EC2... tentativa {attempt}/{max_attempts}")
                  if attempt < max_attempts:
                      time.sleep(sleep_seconds)

          print(f"::error::Não foi possível acessar {host}:22 após várias tentativas.")
          sys.exit(1)
          PY

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 2m
          command_timeout: 15m
          script: |
            cd ~/estudo-chatbot
            git pull origin main
            docker compose up -d --build
            curl -sf http://localhost:8000/health || (docker compose logs api && exit 1)
